<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Keystone Drop-in Auth Example</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0d1117;
      color: #e8ecf1;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
    }
    .card {
      background: #1a2029;
      border: 1px solid #2a3039;
      border-radius: 16px;
      padding: 32px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
    }
    h1 { margin: 0 0 8px; font-size: 22px; }
    p.subtitle { margin: 0 0 24px; color: #9ba3b0; font-size: 14px; }
    .field { margin-bottom: 16px; }
    label { display: block; margin-bottom: 6px; font-size: 13px; color: #c8cdd6; }
    input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid #2a3039;
      background: #111820;
      color: #e8ecf1;
      font-size: 14px;
      outline: none;
    }
    input:focus { border-color: #d4af37; }
    button {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(135deg, #d4af37, #b8962f);
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      font-size: 14px;
      margin-top: 8px;
    }
    button.secondary {
      background: transparent;
      border: 1px solid #2a3039;
      color: #c8cdd6;
    }
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
      color: #6b7280;
      font-size: 12px;
    }
    .divider::before, .divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: #2a3039;
    }
    .message {
      margin-top: 16px;
      padding: 12px;
      border-radius: 10px;
      font-size: 13px;
      display: none;
    }
    .message.error { background: rgba(220, 38, 38, 0.1); color: #f87171; display: block; }
    .message.success { background: rgba(16, 185, 129, 0.1); color: #34d399; display: block; }

    /* Radio-tab switching for login / register */
    .tabs { display: none; }
    .tab-labels { display: flex; gap: 8px; margin-bottom: 20px; }
    .tab-labels label {
      flex: 1;
      text-align: center;
      padding: 10px;
      border-radius: 10px;
      cursor: pointer;
      background: #111820;
      border: 1px solid #2a3039;
      color: #9ba3b0;
      font-size: 13px;
    }
    #tab-login:checked ~ .tab-labels label[for="tab-login"],
    #tab-register:checked ~ .tab-labels label[for="tab-register"] {
      background: rgba(212, 175, 55, 0.12);
      border-color: #d4af37;
      color: #e8ecf1;
    }
    .form-panel { display: none; }
    #tab-login:checked ~ #login-panel,
    #tab-register:checked ~ #register-panel { display: block; }

    /* Authenticated state */
    .auth-only { display: none; }
    .guest-only { display: block; }
    html[data-keystone-authenticated="true"] .auth-only { display: block; }
    html[data-keystone-authenticated="true"] .guest-only { display: none; }

    .profile { text-align: center; }
    .profile h2 { margin: 0 0 8px; font-size: 20px; }
    .profile p { margin: 0 0 24px; color: #9ba3b0; font-size: 14px; }
  </style>
</head>
<body>
  <div class="card">
    <!-- Guest view: login / register -->
    <div class="guest-only">
      <h1>Welcome</h1>
      <p class="subtitle">Sign in or create a Keystone account</p>

      <input type="radio" name="auth-tab" id="tab-login" class="tabs" checked />
      <input type="radio" name="auth-tab" id="tab-register" class="tabs" />

      <div class="tab-labels">
        <label for="tab-login">Sign In</label>
        <label for="tab-register">Create Account</label>
      </div>

      <form id="keystone-login-form" class="form-panel" data-keystone-form="login">
        <div class="field">
          <label for="login-email">Email</label>
          <input id="login-email" data-keystone-input="email" type="email" placeholder="you@example.com" required />
        </div>
        <div class="field">
          <label for="login-password">Password</label>
          <input id="login-password" data-keystone-input="password" type="password" placeholder="••••••••" required />
        </div>
        <button type="submit">Sign In</button>
        <div class="keystone-message message"></div>
      </form>

      <form id="keystone-register-form" class="form-panel" data-keystone-form="register">
        <div class="field">
          <label for="reg-username">Username</label>
          <input id="reg-username" data-keystone-input="username" type="text" placeholder="johndoe" required />
        </div>
        <div class="field">
          <label for="reg-name">Full name</label>
          <input id="reg-name" data-keystone-input="name" type="text" placeholder="John Doe" />
        </div>
        <div class="field">
          <label for="reg-email">Email</label>
          <input id="reg-email" data-keystone-input="email" type="email" placeholder="you@example.com" required />
        </div>
        <div class="field">
          <label for="reg-password">Password</label>
          <input id="reg-password" data-keystone-input="password" type="password" placeholder="••••••••" required />
        </div>
        <button type="submit">Create Account</button>
        <div class="keystone-message message"></div>
      </form>

      <div class="divider">or</div>
      <button id="keystone-google-btn" type="button" class="secondary">Sign in with Google</button>
    </div>

    <!-- Authenticated view: profile -->
    <div class="auth-only profile">
      <h1>You are signed in</h1>
      <p><span data-keystone-field="email"></span></p>
      <button id="keystone-logout" type="button">Sign Out</button>
    </div>
  </div>

  <!--
    One Keystone script does everything:
    - Auto-connects this project
    - Auto-wires forms and buttons
    - Checks existing session on load
  -->
  <script src="http://localhost:4001/sdk/keystone-dropin.js"
          data-keystone-url="http://localhost:4001"
          data-keystone-project-id="my-html-project"
          data-keystone-callback="/callback.html"
          data-keystone-autowire="true"
          data-keystone-check-session="true"></script>
</body>
</html>
