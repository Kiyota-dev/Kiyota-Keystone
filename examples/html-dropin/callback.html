<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Keystone Callback</title>
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0d1117;
      color: #e8ecf1;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }
    .card {
      background: #1a2029;
      border: 1px solid #2a3039;
      border-radius: 16px;
      padding: 32px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Completing sign in…</h1>
    <p style="color: #9ba3b0;">Please wait while we finish authentication.</p>
  </div>

  <script src="http://localhost:4001/sdk/keystone-dropin.js"
          data-keystone-url="http://localhost:4001"></script>
  <script>
    async function finish() {
      try {
        const user = await Keystone.getUser();
        if (user) {
          window.location.href = "index.html";
        } else {
          document.querySelector("p").textContent = "Could not sign in. Please go back and try again.";
        }
      } catch (err) {
        document.querySelector("p").textContent = "Authentication error. Please go back and try again.";
      }
    }
    finish();
  </script>
</body>
</html>
