services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: kiyota
      POSTGRES_PASSWORD: kiyota
      POSTGRES_DB: kiyota
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "kiyota"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
