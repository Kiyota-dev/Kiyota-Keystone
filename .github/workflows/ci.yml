name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: kiyota
          POSTGRES_PASSWORD: kiyota
          POSTGRES_DB: kiyota
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install backend dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build backend
        run: npm run build

      - name: Run backend tests
        env:
          DATABASE_URL: postgresql://kiyota:kiyota@localhost:5432/kiyota
          REDIS_URL: redis://localhost:6379
          NODE_ENV: test
          KEYSTONE_INTERNAL_API_KEY: test-key
          KEYSTONE_ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef
        run: npm test -- --test-timeout=60000

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Run frontend tests
        working-directory: frontend
        run: npm run test -- --run

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t kiyota-keystone:test .
