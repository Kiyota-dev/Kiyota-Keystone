apiVersion: apps/v1
kind: Deployment
metadata:
  name: keystone
  namespace: keystone
  labels:
    app.kubernetes.io/name: keystone
    app.kubernetes.io/part-of: kiyota
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: keystone
  template:
    metadata:
      labels:
        app.kubernetes.io/name: keystone
    spec:
      serviceAccountName: keystone
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: keystone
          image: ghcr.io/kiyota-dev/kiyota-keystone:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 4001
              protocol: TCP
          envFrom:
            - configMapRef:
                name: keystone-config
            - secretRef:
                name: keystone-secrets
          env:
            - name: KEYSTONE_CONFIG_MODE
              value: "json"
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
