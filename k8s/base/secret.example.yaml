apiVersion: v1
kind: Secret
metadata:
  name: keystone-secrets
  namespace: keystone
  labels:
    app.kubernetes.io/name: keystone
type: Opaque
stringData:
  DATABASE_URL: "postgresql://user:password@postgres:5432/kiyota"
  REDIS_URL: "redis://redis:6379"
  AUTH_API_PUBLIC_URL: "https://keystone.example.com"
  CLIENT_APP_URL: "https://admin.keystone.example.com"
  ALLOWED_ORIGINS: "https://admin.keystone.example.com"
  KEYSTONE_INTERNAL_API_KEY: "change-me"
  KEYSTONE_ENCRYPTION_KEY: "change-me-32-characters-long"
  SMTP_HOST: "smtp.example.com"
  SMTP_PORT: "587"
  SMTP_USER: "keystone@example.com"
  SMTP_PASS: "change-me"
  GOOGLE_CLIENT_ID: ""
  GOOGLE_CLIENT_SECRET: ""
  GITHUB_CLIENT_ID: ""
  GITHUB_CLIENT_SECRET: ""
