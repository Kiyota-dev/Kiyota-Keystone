apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: keystone

resources:
  - namespace.yaml
  - serviceaccount.yaml
  - configmap.yaml
  - secret.example.yaml
  - deployment.yaml
  - service.yaml
  - ingress.yaml
  - hpa.yaml
  - pdb.yaml

images:
  - name: ghcr.io/kiyota-dev/kiyota-keystone
    newTag: latest

commonLabels:
  app.kubernetes.io/name: keystone
  app.kubernetes.io/part-of: kiyota
